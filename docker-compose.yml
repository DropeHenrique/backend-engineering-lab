services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 12

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      target: dev
    working_dir: /var/www/html
    volumes:
      - ./notification-service:/var/www/html
    ports:
      - "${NOTIFICATION_HTTP_PORT:-8081}:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lab.events}
      RABBITMQ_QUEUE_NOTIFICATIONS: ${RABBITMQ_QUEUE_NOTIFICATIONS:-notifications}
      RABBITMQ_QUEUE_DLQ: ${RABBITMQ_QUEUE_DLQ:-notifications.dlq}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /var/www/html/storage/logs
      && chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache
      && touch /var/www/html/database/database.sqlite
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 35s

  notification-worker:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      target: dev
    working_dir: /var/www/html
    volumes:
      - ./notification-service:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lab.events}
      RABBITMQ_QUEUE_NOTIFICATIONS: ${RABBITMQ_QUEUE_NOTIFICATIONS:-notifications}
      RABBITMQ_QUEUE_DLQ: ${RABBITMQ_QUEUE_DLQ:-notifications.dlq}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    command: >
      sh -c "chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache
      && php artisan notifications:consume"
    restart: unless-stopped

  webhook-service:
    build:
      context: ./webhook-service
      dockerfile: Dockerfile
      target: dev
    working_dir: /var/www/html
    volumes:
      - ./webhook-service:/var/www/html
    ports:
      - "${WEBHOOK_HTTP_PORT:-8082}:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lab.events}
      WEBHOOK_STRIPE_SECRET: ${WEBHOOK_STRIPE_SECRET:-stripe_hmac_lab_secret_plain}
      WEBHOOK_GITHUB_SECRET: ${WEBHOOK_GITHUB_SECRET:-demo_github_webhook_secret}
      WEBHOOK_HOTMART_SECRET: ${WEBHOOK_HOTMART_SECRET:-demo_hotmart_hmac_secret}
      WEBHOOK_GENERIC_SECRET: ${WEBHOOK_GENERIC_SECRET:-demo_generic_secret}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /var/www/html/storage/logs
      && chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache
      && touch /var/www/html/database/database.sqlite
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 35s

  rate-limiter:
    build:
      context: ./rate-limiter
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${RATE_LIMITER_HTTP_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      REDIS_DOWN_MODE: ${REDIS_DOWN_MODE:-allow}
      WEBHOOK_UPSTREAM: http://webhook-service:8080
    depends_on:
      redis:
        condition: service_healthy
      webhook-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  default:
    name: backend-engineering-lab
